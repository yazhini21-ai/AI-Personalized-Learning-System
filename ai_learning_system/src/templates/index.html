<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Based Personalized Learning System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <h1>Welcome to the AI-Based Personalized Learning System</h1>
    </header>
    <main>
        <section id="student-performance">
            <h2>Student Performance</h2>
            <div id="performance-data">
                <!-- Performance data will be dynamically inserted here -->
            </div>
        </section>
        <section id="weak-subjects">
            <h2>Weak Subjects</h2>
            <div id="weak-subjects-data">
                <!-- Weak subjects will be dynamically inserted here -->
            </div>
        </section>
        <section id="syllabus">
            <h2>Syllabus Topics</h2>
            <div id="syllabus-data">
                <!-- Syllabus topics will be dynamically inserted here -->
            </div>
        </section>
        <section id="notes">
            <h2>Notes</h2>
            <div id="notes-data">
                <!-- Notes will be dynamically inserted here -->
            </div>
        </section>
        <section id="recommendations">
            <h2>Learning Material Recommendations</h2>
            <div id="recommendations-data">
                <!-- Recommendations will be dynamically inserted here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 AI-Based Personalized Learning System</p>
    </footer>
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</body>
</html>
